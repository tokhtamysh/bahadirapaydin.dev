<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bahadır Apaydın</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #00000f;
      font-family: 'Exo 2', sans-serif;
    }
    canvas { position: fixed; inset: 0; }
    #bgCanvas    { z-index: 0; }
    #solarCanvas { z-index: 1; }

    .tooltip {
      position: fixed;
      background: rgba(5,5,20,0.92);
      border: 1px solid rgba(255,255,255,0.18);
      color: #e8e8ff;
      font-family: 'Exo 2', sans-serif;
      font-size: 13px;
      padding: 7px 14px;
      border-radius: 8px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<canvas id="solarCanvas"></canvas>
<div class="tooltip" id="tooltip"></div>

<script>
/* ═══════════════════════════════════════
   YARDIMCI
═══════════════════════════════════════ */
function rand(a,b){ return a + Math.random()*(b-a); }

/* ═══════════════════════════════════════
   CANVAS & BOYUTLAR
═══════════════════════════════════════ */
const bgCanvas    = document.getElementById('bgCanvas');
const bgCtx       = bgCanvas.getContext('2d');
const solarCanvas = document.getElementById('solarCanvas');
const ctx         = solarCanvas.getContext('2d');
let W, H, CX, CY;

function resize(){
  W = bgCanvas.width  = solarCanvas.width  = window.innerWidth;
  H = bgCanvas.height = solarCanvas.height = window.innerHeight;
  CX = W/2; CY = H/2;
  buildStars();
}

/* ═══════════════════════════════════════
   ARKA PLAN — YILDIZLAR + KAYAN YILDIZLAR
═══════════════════════════════════════ */
let stars=[], shooters=[];

function buildStars(){
  stars=[];
  for(let i=0;i<320;i++) stars.push({
    x:rand(0,W), y:rand(0,H),
    r:rand(0.25,1.7),
    a:rand(0.2,1),
    spd:rand(0.004,0.018),
    dir:Math.random()>0.5?1:-1
  });
}

function spawnShooter(){
  const fromTop=Math.random()<0.55;
  const x=fromTop?rand(0,W):0;
  const y=fromTop?0:rand(0,H*0.5);
  const angle=rand(28,58)*Math.PI/180;
  const spd=rand(9,15);
  shooters.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,
    len:rand(90,180),life:1,decay:rand(0.007,0.016),spd});
}
function scheduleShooter(){ spawnShooter(); setTimeout(scheduleShooter,rand(1800,5000)); }

function drawBg(){
  bgCtx.clearRect(0,0,W,H);
  /* nebula katmanları */
  [
    {x:0.18,y:0.82,c:'rgba(28,0,75,0.32)'},
    {x:0.82,y:0.18,c:'rgba(0,25,75,0.28)'},
    {x:0.55,y:0.55,c:'rgba(70,0,35,0.18)'}
  ].forEach(n=>{
    const g=bgCtx.createRadialGradient(n.x*W,n.y*H,0,n.x*W,n.y*H,Math.max(W,H)*0.45);
    g.addColorStop(0,n.c); g.addColorStop(1,'transparent');
    bgCtx.fillStyle=g; bgCtx.fillRect(0,0,W,H);
  });
  /* yıldızlar */
  stars.forEach(s=>{
    s.a+=s.spd*s.dir;
    if(s.a>=1){s.a=1;s.dir=-1;} if(s.a<=0.15){s.a=0.15;s.dir=1;}
    bgCtx.beginPath(); bgCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgCtx.fillStyle=`rgba(255,255,255,${s.a})`; bgCtx.fill();
  });
  /* kayan yıldızlar */
  for(let i=shooters.length-1;i>=0;i--){
    const s=shooters[i];
    s.x+=s.vx; s.y+=s.vy; s.life-=s.decay;
    const tailLen=s.len/s.spd;
    const tx=s.x-s.vx*tailLen, ty=s.y-s.vy*tailLen;
    const g=bgCtx.createLinearGradient(tx,ty,s.x,s.y);
    g.addColorStop(0,'rgba(255,255,255,0)');
    g.addColorStop(1,`rgba(200,210,255,${Math.max(0,s.life)})`);
    bgCtx.beginPath(); bgCtx.moveTo(tx,ty); bgCtx.lineTo(s.x,s.y);
    bgCtx.strokeStyle=g; bgCtx.lineWidth=1.6; bgCtx.stroke();
    bgCtx.beginPath(); bgCtx.arc(s.x,s.y,2,0,Math.PI*2);
    bgCtx.fillStyle=`rgba(255,255,220,${Math.max(0,s.life)})`; bgCtx.fill();
    if(s.life<=0||s.x>W+80||s.y>H+80) shooters.splice(i,1);
  }
}

/* ═══════════════════════════════════════
   GÜNEŞ — hareketli alev kenarlı
═══════════════════════════════════════ */
const FLAME_N=22;
const flamePoints=[];
for(let i=0;i<FLAME_N;i++) flamePoints.push({
  base:(i/FLAME_N)*Math.PI*2,
  phase:rand(0,Math.PI*2),
  spd:rand(0.5,1.3),
  amp:rand(0.04,0.20)
});

function sunRadius(angle,t){
  let r=72;
  flamePoints.forEach(fp=>{
    const diff=Math.abs(angle-fp.base);
    const d=Math.min(diff,Math.PI*2-diff);
    const g=Math.exp(-(d*d)/0.20);
    r+=g*fp.amp*72*Math.sin(fp.spd*t+fp.phase);
  });
  return r;
}

function drawSun(t){
  const STEPS=200;
  /* dış glow */
  const glo=ctx.createRadialGradient(CX,CY,55,CX,CY,175);
  glo.addColorStop(0,'rgba(255,150,20,0.50)');
  glo.addColorStop(0.4,'rgba(255,80,10,0.22)');
  glo.addColorStop(1,'rgba(255,40,0,0)');
  ctx.fillStyle=glo; ctx.beginPath(); ctx.arc(CX,CY,175,0,Math.PI*2); ctx.fill();

  /* alev gövdesi */
  ctx.beginPath();
  for(let i=0;i<=STEPS;i++){
    const a=(i/STEPS)*Math.PI*2;
    const r=sunRadius(a,t);
    const x=CX+Math.cos(a)*r, y=CY+Math.sin(a)*r;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  const gSun=ctx.createRadialGradient(CX-20,CY-20,4,CX,CY,92);
  gSun.addColorStop(0,'#fff8c0');
  gSun.addColorStop(0.22,'#ffe055');
  gSun.addColorStop(0.52,'#ff9500');
  gSun.addColorStop(0.78,'#ff4800');
  gSun.addColorStop(1,'#bb1800');
  ctx.fillStyle=gSun; ctx.fill();

  /* iç parlak çekirdek */
  const gC=ctx.createRadialGradient(CX-12,CY-12,2,CX,CY,52);
  gC.addColorStop(0,'rgba(255,255,220,0.92)');
  gC.addColorStop(0.5,'rgba(255,220,80,0.30)');
  gC.addColorStop(1,'rgba(255,140,0,0)');
  ctx.fillStyle=gC; ctx.beginPath(); ctx.arc(CX,CY,56,0,Math.PI*2); ctx.fill();

  /* güneş lekesi benzeri koyu noktalar */
  [{ox:-18,oy:14,r:7},{ox:20,oy:-16,r:5},{ox:8,oy:22,r:6}].forEach(sp=>{
    const gsp=ctx.createRadialGradient(CX+sp.ox,CY+sp.oy,0,CX+sp.ox,CY+sp.oy,sp.r);
    gsp.addColorStop(0,'rgba(120,40,0,0.5)'); gsp.addColorStop(1,'rgba(180,80,0,0)');
    ctx.fillStyle=gsp; ctx.beginPath(); ctx.arc(CX+sp.ox,CY+sp.oy,sp.r,0,Math.PI*2); ctx.fill();
  });

  /* metin */
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='bold 11.5px "Cinzel",serif';
  ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=8;
  ctx.fillStyle='rgba(255,255,245,0.97)';
  ctx.fillText('BAHADIR',CX,CY-7.5);
  ctx.fillText('APAYDIN',CX,CY+8.5);
  ctx.restore();
}

/* ═══════════════════════════════════════
   YÖRÜNGELER
═══════════════════════════════════════ */
const orbits=[
  {r:158, dur:14},
  {r:225, dur:22},
  {r:302, dur:34},
  {r:385, dur:48}
];
function drawOrbits(){
  ctx.setLineDash([3,6]);
  orbits.forEach(o=>{
    ctx.beginPath(); ctx.arc(CX,CY,o.r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.09)'; ctx.lineWidth=1; ctx.stroke();
  });
  ctx.setLineDash([]);
}

/* ═══════════════════════════════════════
   GEZEGEN ÇİZİM FONKSİYONLARI
═══════════════════════════════════════ */
function labelText(cx,cy,label){
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='bold 8.5px "Cinzel",serif';
  ctx.shadowColor='rgba(0,0,0,1)'; ctx.shadowBlur=9;
  ctx.fillStyle='rgba(255,255,255,0.95)';
  ctx.fillText(label,cx,cy);
  ctx.restore();
}

/* MARS */
function drawMars(cx,cy){
  const R=30;
  /* glow */
  const gg=ctx.createRadialGradient(cx,cy,R*0.5,cx,cy,R*1.7);
  gg.addColorStop(0,'rgba(210,80,40,0.38)'); gg.addColorStop(1,'rgba(180,50,15,0)');
  ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(cx,cy,R*1.7,0,Math.PI*2); ctx.fill();
  /* yüzey */
  const gs=ctx.createRadialGradient(cx-R*0.35,cy-R*0.3,2,cx,cy,R);
  gs.addColorStop(0,'#e8845c'); gs.addColorStop(0.28,'#c84e2a');
  gs.addColorStop(0.68,'#8a2610'); gs.addColorStop(1,'#480e04');
  ctx.fillStyle=gs; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
  /* kratere benzer lekeler */
  ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();
  [{ox:-9,oy:6,r:7,a:0.28},{ox:11,oy:-9,r:5,a:0.22},{ox:-2,oy:15,r:5,a:0.2},{ox:14,oy:9,r:4,a:0.18}]
  .forEach(p=>{
    ctx.beginPath(); ctx.arc(cx+p.ox,cy+p.oy,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(55,8,2,${p.a})`; ctx.fill();
  });
  ctx.restore();
  /* kuzey kutbu */
  const gp=ctx.createRadialGradient(cx,cy-R+3,0,cx,cy-R+3,11);
  gp.addColorStop(0,'rgba(255,235,220,0.72)'); gp.addColorStop(1,'rgba(255,210,190,0)');
  ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();
  ctx.fillStyle=gp; ctx.fillRect(cx-R,cy-R,R*2,R); ctx.restore();
  /* specular */
  const gsp=ctx.createRadialGradient(cx-R*0.35,cy-R*0.35,0,cx-R*0.35,cy-R*0.35,R*0.45);
  gsp.addColorStop(0,'rgba(255,190,155,0.48)'); gsp.addColorStop(1,'rgba(255,130,90,0)');
  ctx.fillStyle=gsp; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
  labelText(cx,cy,'HAKKIMDA');
}

/* VENÜS */
function drawVenus(cx,cy){
  const R=34;
  const gg=ctx.createRadialGradient(cx,cy,R*0.5,cx,cy,R*1.75);
  gg.addColorStop(0,'rgba(230,185,65,0.42)'); gg.addColorStop(1,'rgba(200,140,15,0)');
  ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(cx,cy,R*1.75,0,Math.PI*2); ctx.fill();
  const gs=ctx.createRadialGradient(cx-R*0.3,cy-R*0.28,2,cx,cy,R);
  gs.addColorStop(0,'#fff5a5'); gs.addColorStop(0.28,'#eacc42');
  gs.addColorStop(0.65,'#b88012'); gs.addColorStop(1,'#674a02');
  ctx.fillStyle=gs; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
  ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();
  [{oy:-13,h:6,c:'rgba(255,245,110,0.18)'},{oy:-4,h:5,c:'rgba(200,165,22,0.16)'},
   {oy:6,h:7,c:'rgba(255,225,85,0.16)'},{oy:15,h:5,c:'rgba(185,135,10,0.13)'}]
  .forEach(b=>{ ctx.fillStyle=b.c; ctx.fillRect(cx-R,cy+b.oy,R*2,b.h); });
  ctx.restore();
  const gsp=ctx.createRadialGradient(cx-R*0.32,cy-R*0.32,0,cx-R*0.32,cy-R*0.32,R*0.5);
  gsp.addColorStop(0,'rgba(255,255,205,0.52)'); gsp.addColorStop(1,'rgba(255,235,100,0)');
  ctx.fillStyle=gsp; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
  labelText(cx,cy,'PROJELERİM');
}

/* SATURN — halkalı */
function saturnRings(cx,cy,R,back){
  const rings=[
    {ri:R*1.28,ro:R*1.62,c:'rgba(215,188,118,0.58)'},
    {ri:R*1.65,ro:R*1.92,c:'rgba(182,152,82,0.42)'},
    {ri:R*1.95,ro:R*2.12,c:'rgba(152,118,60,0.28)'}
  ];
  ctx.save(); ctx.translate(cx,cy); ctx.scale(1,0.30);
  rings.forEach(rg=>{
    ctx.beginPath();
    if(back){
      ctx.arc(0,0,rg.ro,Math.PI,Math.PI*2);
      ctx.arc(0,0,rg.ri,Math.PI*2,Math.PI,true);
    } else {
      ctx.arc(0,0,rg.ro,0,Math.PI);
      ctx.arc(0,0,rg.ri,Math.PI,0,true);
    }
    ctx.closePath();
    ctx.fillStyle=rg.c; ctx.fill();
  });
  ctx.restore();
}

function drawSaturn(cx,cy){
  const R=28;
  saturnRings(cx,cy,R,true); /* arka halka */
  const gg=ctx.createRadialGradient(cx,cy,R*0.4,cx,cy,R*1.65);
  gg.addColorStop(0,'rgba(215,188,120,0.36)'); gg.addColorStop(1,'rgba(180,140,58,0)');
  ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(cx,cy,R*1.65,0,Math.PI*2); ctx.fill();
  const gs=ctx.createRadialGradient(cx-R*0.3,cy-R*0.28,2,cx,cy,R);
  gs.addColorStop(0,'#f5e8b2'); gs.addColorStop(0.32,'#caab4a');
  gs.addColorStop(0.7,'#8a6622'); gs.addColorStop(1,'#4a3208');
  ctx.fillStyle=gs; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
  ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();
  [{oy:-10,h:5,c:'rgba(200,162,62,0.20)'},{oy:-2,h:4,c:'rgba(162,122,30,0.18)'},{oy:8,h:6,c:'rgba(200,162,62,0.15)'}]
  .forEach(b=>{ ctx.fillStyle=b.c; ctx.fillRect(cx-R,cy+b.oy,R*2,b.h); });
  ctx.restore();
  const gsp=ctx.createRadialGradient(cx-R*0.3,cy-R*0.3,0,cx-R*0.3,cy-R*0.3,R*0.42);
  gsp.addColorStop(0,'rgba(255,255,222,0.52)'); gsp.addColorStop(1,'rgba(255,232,150,0)');
  ctx.fillStyle=gsp; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
  saturnRings(cx,cy,R,false); /* ön halka */
  labelText(cx,cy,'YAZILARIM');
}

/* URANÜS */
function drawUranus(cx,cy){
  const R=32;
  const gg=ctx.createRadialGradient(cx,cy,R*0.5,cx,cy,R*1.75);
  gg.addColorStop(0,'rgba(95,215,225,0.36)'); gg.addColorStop(1,'rgba(35,158,180,0)');
  ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(cx,cy,R*1.75,0,Math.PI*2); ctx.fill();
  const gs=ctx.createRadialGradient(cx-R*0.32,cy-R*0.28,2,cx,cy,R);
  gs.addColorStop(0,'#d2f8ff'); gs.addColorStop(0.28,'#5eccd8');
  gs.addColorStop(0.65,'#1a8898'); gs.addColorStop(1,'#054050');
  ctx.fillStyle=gs; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
  ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();
  [{oy:-9,h:5,c:'rgba(175,242,255,0.14)'},{oy:3,h:4,c:'rgba(100,202,222,0.12)'},{oy:12,h:5,c:'rgba(148,232,245,0.10)'}]
  .forEach(b=>{ ctx.fillStyle=b.c; ctx.fillRect(cx-R,cy+b.oy,R*2,b.h); });
  ctx.restore();
  /* dikey halkalar */
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(-Math.PI/5);
  [{ri:R*1.35,ro:R*1.52,a:0.22},{ri:R*1.56,ro:R*1.68,a:0.14}].forEach(rg=>{
    ctx.save(); ctx.scale(1,0.26);
    ctx.beginPath(); ctx.arc(0,0,rg.ro,0,Math.PI*2); ctx.arc(0,0,rg.ri,0,Math.PI*2,true);
    ctx.fillStyle=`rgba(130,218,232,${rg.a})`; ctx.fill(); ctx.restore();
  });
  ctx.restore();
  const gsp=ctx.createRadialGradient(cx-R*0.32,cy-R*0.32,0,cx-R*0.32,cy-R*0.32,R*0.46);
  gsp.addColorStop(0,'rgba(215,255,255,0.56)'); gsp.addColorStop(1,'rgba(100,222,235,0)');
  ctx.fillStyle=gsp; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
  labelText(cx,cy,'İLETİŞİM');
}

/* ═══════════════════════════════════════
   GEZEGEN VERİLERİ & HIT-TEST
═══════════════════════════════════════ */
const planets=[
  {orbitR:158, dur:14, startA:0.5,  draw:drawMars,   label:'HAKKIMDA',   hitR:32},
  {orbitR:225, dur:22, startA:2.1,  draw:drawVenus,  label:'PROJELERİM', hitR:36},
  {orbitR:302, dur:34, startA:4.0,  draw:drawSaturn, label:'YAZILARIM',  hitR:60},
  {orbitR:385, dur:48, startA:1.2,  draw:drawUranus, label:'İLETİŞİM',   hitR:35}
];
planets.forEach(p=>{ p.angle=p.startA; });
let pPos=[{x:0,y:0},{x:0,y:0},{x:0,y:0},{x:0,y:0}];

/* ═══════════════════════════════════════
   ANA DÖNGÜ
═══════════════════════════════════════ */
const TWO_PI=Math.PI*2;
let last=null, T=0;

function loop(ts){
  if(!last) last=ts;
  const dt=Math.min((ts-last)/1000,0.05); last=ts; T+=dt;

  drawBg();
  ctx.clearRect(0,0,W,H);
  drawOrbits();
  drawSun(T);

  planets.forEach((p,i)=>{
    p.angle+=(TWO_PI/p.dur)*dt;
    const px=CX+Math.cos(p.angle)*p.orbitR;
    const py=CY+Math.sin(p.angle)*p.orbitR;
    pPos[i]={x:px,y:py};
    p.draw(px,py);
  });

  requestAnimationFrame(loop);
}

/* ═══════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════ */
const tooltip=document.getElementById('tooltip');
solarCanvas.addEventListener('mousemove',e=>{
  const rect=solarCanvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  let hit=false;
  pPos.forEach((pos,i)=>{
    const dx=mx-pos.x, dy=my-pos.y;
    if(Math.sqrt(dx*dx+dy*dy)<planets[i].hitR+8){
      tooltip.textContent=planets[i].label+' — Yakında!';
      tooltip.style.opacity='1';
      tooltip.style.left=(e.clientX+18)+'px';
      tooltip.style.top=(e.clientY+16)+'px';
      solarCanvas.style.cursor='pointer'; hit=true;
    }
  });
  if(!hit){ tooltip.style.opacity='0'; solarCanvas.style.cursor='default'; }
});
solarCanvas.addEventListener('mouseleave',()=>{ tooltip.style.opacity='0'; });

/* ═══════════════════════════════════════
   BAŞLAT
═══════════════════════════════════════ */
window.addEventListener('resize',resize);
resize();
setTimeout(scheduleShooter,1500);
requestAnimationFrame(loop);
</script>
</body>
</html>
